site_name: Basiscursus Copilot Stad
site_url: https://blueblot-lier.github.io/basiscursus/

theme:
  name: material
  language: nl
  font:
    text: Nunito
    code: Roboto Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.sections       # groepeert secties visueel in de zijbalk
    - navigation.expand         # klapt de actieve sectie automatisch open
    - navigation.top            # "terug naar boven"-knop
    - navigation.indexes        # sectiepagina's klikbaar als landingspagina
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow                # inhoudsopgave volgt mee bij scrollen

extra_css:
  - stylesheets/extra.css

nav:
  - Startpagina: index.md
  - Oriëntatie:
    - orientatie/index.md
    - Over de cursus: orientatie/over.md
    - Aan de slag: orientatie/toegang.md
    - Quick scan: orientatie/quickscan.md
  - Fase 1 - Basis:
    - fase1/index.md
    - Intro tot AI & Copilot: fase1/intro.md
    - Hoe AI werkt: fase1/werking.md
  - Fase 2 - Vaardigheden:
    - fase2/index.md
    - Leren prompten: fase2/prompten.md
  - Fase 3 - Tools:
    - fase3/index.md
    - Outlook: fase3/outlook.md
    - Word: fase3/word.md
    - Teams: fase3/teams.md
    - Excel: fase3/excel.md
    - PowerPoint: fase3/powerpoint.md
  - Fase 4 - Toepassing:
    - fase4/index.md
    - Dagelijkse taken: fase4/taken.md
    - Use cases per dienst: fase4/diensten.md
  - Fase 5 - Verdieping:
    - fase5/index.md
    - Gevorderd gebruik: fase5/gevorderd.md
  - Veilig & verantwoord:
    - veiligheid/index.md
    - Kwaliteit & controle: veiligheid/kwaliteit.md
    - Privacy & GDPR: veiligheid/privacy.md
  - Praktijk & oefeningen: praktijk.md
  - Toetsing: toetsing.md
  - Ondersteuning & beleid: ondersteuning.md

plugins:
  - search:
      lang: nl