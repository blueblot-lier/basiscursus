site_name: Basiscursus Copilot Stad
site_url: https://blueblot-lier.github.io/basiscursus/

theme:
  name: material
  language: nl
  font:
    text: Nunito
    code: Roboto Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/extra.css

nav:
  - Startpagina: index.md
  - Oriëntatie:
    - Over de cursus: orientatie/over.md
    - Aan de slag: orientatie/toegang.md
    - Quick scan: orientatie/quickscan.md
  - Fase 1 - Basis:
    - Intro tot AI & Copilot: fase1/intro.md
    - Hoe AI werkt: fase1/werking.md
  - Fase 2 - Vaardigheden:
    - Leren prompten: fase2/prompten.md
  - Fase 3 - Tools:
    - Outlook: fase3/outlook.md
    - Word: fase3/word.md
    - Teams: fase3/teams.md
    - Excel: fase3/excel.md
    - PowerPoint: fase3/powerpoint.md
  - Fase 4 - Toepassing:
    - Dagelijkse taken: fase4/taken.md
    - Use cases per team: fase4/diensten.md
  - Fase 5 - Verdieping:
    - Gevorderd gebruik: fase5/gevorderd.md
  - Veilig & verantwoord:
    - Kwaliteit & controle: veiligheid/kwaliteit.md
    - Privacy & GDPR: veiligheid/privacy.md
  - Praktijk & oefeningen: praktijk.md
  - Toetsing: toetsing.md
  - Ondersteuning & beleid: ondersteuning.md

plugins:
  - search:
      lang: nl